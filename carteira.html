<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira — RaizCoin</title>
    <link rel="stylesheet" href="styles.css">
    <script src="firebase.js"></script>
</head>

<body>

<header>
    <h1>Carteira</h1>
    <nav>
        <ul>
            <li><a href="carteira.html">Carteira</a></li>
            <li><a href="historico.html">Historico</a></li>
            <li><a href="ganhardois.html">Ganhar</a></li>
            <li><a href="raizcoin_index.html">Início</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="info-section">
        <h2>Saldo Atual</h2>
        <p id="saldo">A carregar saldo...</p>
    </section>
</main>

<footer>
    <p>&copy; 2024 Mundo Raiz</p>
</footer>

<script type="module">
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    async function carregarSaldo() {
        const db = window.db;
        const ref = doc(db, "users", "mario");
        const snap = await getDoc(ref);

        if (snap.exists()) {
            document.getElementById("saldo").innerText = snap.data().saldo + " RC";
        } else {
            document.getElementById("saldo").innerText = "Erro ao carregar saldo.";
        }
    }

    carregarSaldo();
</script>

</body>
</html>
