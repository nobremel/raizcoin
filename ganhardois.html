<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganhar RC</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Ganhar RC</h1>
        <nav>
            <a href="raizcoin_index.html">Início</a>
            <a href="carteira.html">Carteira</a>
            <a href="historico.html">Histórico</a>
            <a href="ganhardois.html" class="active">Ganhar</a>
        </nav>
    </header>

    <section class="info-section">
        <h2>Missões rápidas</h2>

        <button onclick="ganhar(5)">Explorar um espaço (+5 RC)</button>
        <button onclick="ganhar(10)">Completar um ritual (+10 RC)</button>
        <button onclick="ganhar(20)">Descoberta especial (+20 RC)</button>

        <p id="feedback" class="feedback"></p>
    </section>

    <footer>
        <p>© 2024 Mundo Raiz</p>
    </footer>

    <!-- Firebase config -->
    <script src="firebase.js"></script>

    <!-- Firebase + lógica -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, getDoc, addDoc, collection } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1JxgT8Qm2W0p4uHkGgkMZpQ0zVvYt1x0",
            authDomain: "mundoraiz-e8e08.firebaseapp.com",
            projectId: "mundoraiz-e8e08",
            storageBucket: "mundoraiz-e8e08.appspot.com",
            messagingSenderId: "1029384756",
            appId: "1:1029384756:web:abcdef123456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function ganhar(valor) {
            const userRef = doc(db, "users", "mario");

            const snap = await getDoc(userRef);
            const saldoAtual = snap.data().saldo || 0;

            await updateDoc(userRef, { saldo: saldoAtual + valor });

            await addDoc(collection(db, "users", "mario", "historico"), {
                tipo: "ganho",
                valor: valor,
                timestamp: new Date()
            });

            document.getElementById("feedback").innerText =
                `Ganhaste +${valor} RC!`;
        }

        window.ganhar = ganhar;
    </script>

</body>
</html>
