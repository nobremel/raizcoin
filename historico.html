<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico — RaizCoin</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Histórico</h1>
        <nav>
            <a href="raizcoin_index.html">Início</a>
            <a href="carteira.html">Carteira</a>
            <a href="historico.html" class="active">Histórico</a>
            <a href="ganhardois.html">Ganhar</a>
        </nav>
    </header>

    <section class="info-section">
        <h2>Movimentos</h2>
        <p id="loading">A carregar histórico…</p>
        <ul id="lista-historico"></ul>
    </section>

    <footer>
        <p>© 2024 Mundo Raiz</p>
    </footer>

    <!-- Firebase config -->
    <script src="firebase.js"></script>

    <!-- Firebase + leitura do histórico -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD1JxgT8Qm2W0p4uHkGgkMZpQ0zVvYt1x0",
            authDomain: "mundoraiz-e8e08.firebaseapp.com",
            projectId: "mundoraiz-e8e08",
            storageBucket: "mundoraiz-e8e08.appspot.com",
            messagingSenderId: "1029384756",
            appId: "1:1029384756:web:abcdef123456"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarHistorico() {
            const historicoRef = collection(db, "users", "mario", "historico");
            const q = query(historicoRef, orderBy("timestamp", "desc"));

            const snap = await getDocs(q);

            const lista = document.getElementById("lista-historico");
            const loading = document.getElementById("loading");

            loading.style.display = "none";

            if (snap.empty) {
                lista.innerHTML = "<li>Nenhum movimento registado ainda.</li>";
                return;
            }

            snap.forEach(doc => {
                const dados = doc.data();
                const valor = dados.valor;
                const tipo = dados.tipo;
                const data = dados.timestamp.toDate();

                const item = document.createElement("li");
                item.innerHTML = `
                    <strong>${tipo === "ganho" ? "Ganho" : "Movimento"}</strong>:
                    +${valor} RC  
                    <br>
                    <span class="data">${data.toLocaleString("pt-PT")}</span>
                `;
                lista.appendChild(item);
            });
        }

        carregarHistorico();
    </script>

</body>
</html>
